const C = {
  1: { text: "#e05a2b", border: "#f0a58a", bg: "#fff7f4", badge: "#fde8df", glow: "rgba(224,90,43,0.10)", icon: "🌱" },
  2: { text: "#059669", border: "#6ee7b7", bg: "#f0fdf8", badge: "#d1fae5", glow: "rgba(5,150,105,0.10)", icon: "🏗️" },
  3: { text: "#b45309", border: "#fcd34d", bg: "#fffbeb", badge: "#fef3c7", glow: "rgba(180,83,9,0.10)", icon: "📐" },
  4: { text: "#7c3aed", border: "#c4b5fd", bg: "#f5f3ff", badge: "#ede9fe", glow: "rgba(124,58,237,0.10)", icon: "🎓" },
};

function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}

function App() {
  const isMobile = useIsMobile();
  const [selectedDay, setSelectedDay] = useState(null);
  const [completedDays, setCompletedDays] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("hec_done") || "[]")); }
    catch { return new Set(); }
  });
  const [activePhase, setActivePhase] = useState(null);

  const day = selectedDay ? program.find(d => d.day === selectedDay) : null;
  const colors = day ? C[day.phase] : C[1];
  const progress = Math.round((completedDays.size / 42) * 100);

  const toggleComplete = (d) => {
    setCompletedDays(prev => {
      const n = new Set(prev);
      n.has(d) ? n.delete(d) : n.add(d);
      localStorage.setItem("hec_done", JSON.stringify([...n]));
      return n;
    });
  };

  if (isMobile && selectedDay && day) {
    return <MobileDayView day={day} colors={colors} completedDays={completedDays} toggleComplete={toggleComplete} onBack={() => setSelectedDay(null)} setSelectedDay={setSelectedDay} />;
  }

  const shown = activePhase === null ? phases : phases.filter(p => p.id === activePhase);

  return (
    <div style={{ minHeight: "100vh", background: "#fdfaf6", color: "#1c1917", fontFamily: "system-ui, -apple-system, sans-serif" }}>
      {/* TOP BAR */}
      <div style={{ background: "linear-gradient(135deg, #fff8f1 0%, #fef9ec 50%, #f0fdf8 100%)", borderBottom: "2px solid #e8e0d4", padding: isMobile ? "14px 16px" : "20px 36px", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div>
            <div style={{ fontSize: isMobile ? 10 : 11, letterSpacing: 2.5, color: "#a8a29e", textTransform: "uppercase", fontFamily: "monospace" }}>42 jours · 1h/jour · Objectif B2</div>
            <h1 style={{ margin: "3px 0 0", fontSize: isMobile ? 17 : 21, fontWeight: 800, color: "#292524", letterSpacing: -0.5 }}>🇬🇧 English for HEC Liège</h1>
          </div>
          <ProgressRing pct={progress} done={completedDays.size} isMobile={isMobile} />
        </div>
        <div style={{ maxWidth: 1100, margin: "12px auto 0", display: "flex", gap: 6, flexWrap: "wrap" }}>
          <PhaseTab active={activePhase === null} c={{ text: "#78716c", border: "#d6d3d1", badge: "#f5f5f4", glow: "" }} onClick={() => setActivePhase(null)} label="Tous" sub="42j" />
          {phases.map(p => (
            <PhaseTab key={p.id} active={activePhase === p.id} c={C[p.id]} onClick={() => setActivePhase(activePhase === p.id ? null : p.id)} label={`${C[p.id].icon} ${p.name}`} sub={`J${p.days[0]}-${p.days[1]}`} />
          ))}
        </div>
      </div>

      {/* MAIN */}
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: isMobile ? "16px 12px" : "28px 36px", display: isMobile ? "block" : "grid", gridTemplateColumns: selectedDay ? "300px 1fr" : "1fr", gap: 28 }}>
        <div>
          {shown.map(p => (
            <div key={p.id} style={{ marginBottom: 24 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 18 }}>{C[p.id].icon}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: C[p.id].text }}>{p.name}</span>
                <span style={{ fontSize: 12, color: "#a8a29e" }}>— {p.subtitle}</span>
                <span style={{ fontSize: 11, color: "#c7bdb7", marginLeft: "auto", background: "#f5f0eb", padding: "1px 8px", borderRadius: 10 }}>
                  {program.filter(d => d.phase === p.id && completedDays.has(d.day)).length}/{p.days[1]-p.days[0]+1} ✓
                </span>
              </div>
              <DayGrid days={program.filter(d => d.phase === p.id)} selectedDay={selectedDay} completedDays={completedDays} onSelect={setSelectedDay} isMobile={isMobile} />
            </div>
          ))}
        </div>

        {!isMobile && selectedDay && day && (
          <div style={{ overflowY: "auto", maxHeight: "calc(100vh - 140px)", paddingRight: 4 }}>
            <DayContent day={day} colors={colors} completedDays={completedDays} toggleComplete={toggleComplete} setSelectedDay={setSelectedDay} isMobile={false} />
          </div>
        )}
      </div>
    </div>
  );
}

function ProgressRing({ pct, done, isMobile }) {
  const r = isMobile ? 20 : 26;
  const circ = 2 * Math.PI * r;
  const dash = circ * (pct / 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ textAlign: "right" }}>
        <div style={{ fontSize: isMobile ? 20 : 24, fontWeight: 800, color: "#e05a2b", lineHeight: 1 }}>{pct}%</div>
        <div style={{ fontSize: 10, color: "#a8a29e" }}>{done}/42 complétés</div>
      </div>
      <svg width={isMobile ? 48 : 60} height={isMobile ? 48 : 60} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={isMobile ? 24 : 30} cy={isMobile ? 24 : 30} r={r} fill="none" stroke="#e8e0d4" strokeWidth="3.5" />
        <circle cx={isMobile ? 24 : 30} cy={isMobile ? 24 : 30} r={r} fill="none" stroke="#e05a2b" strokeWidth="3.5" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition: "stroke-dasharray 0.5s ease" }} />
      </svg>
    </div>
  );
}

function PhaseTab({ active, c, onClick, label, sub }) {
  return (
    <button onClick={onClick} style={{ padding: "5px 13px", borderRadius: 20, fontSize: 12, border: `1.5px solid ${active ? c.text : c.border || "#e8e0d4"}`, color: active ? c.text : "#a8a29e", background: active ? c.badge : "white", cursor: "pointer", transition: "all 0.15s", fontWeight: active ? 700 : 400, boxShadow: active ? `0 2px 8px ${c.glow || "rgba(0,0,0,0.06)"}` : "none" }}>
      {label} <span style={{ opacity: 0.6, fontSize: 10 }}>{sub}</span>
    </button>
  );
}

function DayGrid({ days, selectedDay, completedDays, onSelect, isMobile }) {
  const size = isMobile ? 54 : 60;
  return (
    <div style={{ display: "grid", gridTemplateColumns: `repeat(auto-fill, minmax(${size}px, 1fr))`, gap: 7 }}>
      {days.map(d => {
        const c = C[d.phase];
        const done = completedDays.has(d.day);
        const sel = selectedDay === d.day;
        return (
          <button key={d.day} onClick={() => onSelect(d.day)} style={{ height: size, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", borderRadius: 12, border: `2px solid ${sel ? c.text : done ? c.border : "#e8e0d4"}`, background: sel ? c.badge : done ? `${c.text}12` : "white", cursor: "pointer", transition: "all 0.15s", boxShadow: sel ? `0 4px 14px ${c.glow}` : "0 1px 3px rgba(0,0,0,0.04)", gap: 2, padding: 0 }}>
            <span style={{ fontSize: 13, fontWeight: 800, color: sel ? c.text : done ? c.text : "#78716c", lineHeight: 1 }}>{d.day}</span>
            {done && <span style={{ fontSize: 10 }}>✅</span>}
          </button>
        );
      })}
    </div>
  );
}

function MobileDayView({ day, colors, completedDays, toggleComplete, onBack, setSelectedDay }) {
  const done = completedDays.has(day.day);
  return (
    <div style={{ minHeight: "100vh", background: colors.bg, color: "#1c1917", fontFamily: "system-ui, sans-serif" }}>
      <div style={{ background: "white", borderBottom: `2px solid ${colors.border}`, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
        <button onClick={onBack} style={{ background: "transparent", border: "none", color: colors.text, fontSize: 14, cursor: "pointer", fontWeight: 700 }}>← Retour</button>
        <span style={{ fontSize: 13, fontWeight: 700, color: colors.text }}>{C[day.phase].icon} Jour {day.day}</span>
        <button onClick={() => toggleComplete(day.day)} style={{ background: done ? colors.badge : "#f5f0eb", border: `2px solid ${done ? colors.text : "#e8e0d4"}`, color: done ? colors.text : "#78716c", borderRadius: 8, padding: "5px 11px", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>
          {done ? "✅ Fait !" : "Marquer"}
        </button>
      </div>
      <div style={{ padding: "16px 16px 40px" }}>
        <DayContent day={day} colors={colors} completedDays={completedDays} toggleComplete={toggleComplete} setSelectedDay={setSelectedDay} isMobile={true} />
      </div>
    </div>
  );
}

function DayContent({ day, colors, completedDays, toggleComplete, setSelectedDay, isMobile }) {
  const done = completedDays.has(day.day);
  return (
    <div>
      <div style={{ background: `linear-gradient(135deg, ${colors.badge}, white)`, border: `2px solid ${colors.border}`, borderRadius: 16, padding: isMobile ? 16 : 22, marginBottom: 14, boxShadow: `0 4px 20px ${colors.glow}` }}>
        {!isMobile && (
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            <span style={{ fontSize: 12, padding: "3px 12px", borderRadius: 20, background: colors.badge, color: colors.text, border: `1.5px solid ${colors.border}`, fontWeight: 700 }}>{C[day.phase].icon} Jour {day.day}</span>
            <span style={{ fontSize: 12, padding: "3px 12px", borderRadius: 20, background: "#f5f0eb", color: "#a8a29e" }}>Phase {day.phase}</span>
          </div>
        )}
        <h2 style={{ margin: 0, fontSize: isMobile ? 15 : 17, color: "#1c1917", lineHeight: 1.55, fontWeight: 800 }}>{day.objective}</h2>
        {!isMobile && (
          <button onClick={() => toggleComplete(day.day)} style={{ marginTop: 14, background: done ? colors.badge : "white", border: `2px solid ${done ? colors.text : "#e8e0d4"}`, color: done ? colors.text : "#78716c", borderRadius: 10, padding: "8px 18px", fontSize: 13, cursor: "pointer", fontWeight: 700, transition: "all 0.15s" }}>
            {done ? "✅ Jour complété !" : "✓ Marquer comme fait"}
          </button>
        )}
      </div>

      <Card icon="📚" title="Vocabulaire du jour" time={day.vocab.length > 0 ? "~10 min" : ""} colors={colors}>
        {day.vocab.length > 0 ? (
          <>
            <p style={{ margin: "0 0 10px", fontSize: 12, color: "#a8a29e", fontStyle: "italic" }}>{day.vocabNote}</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {day.vocab.map(w => <span key={w} style={{ padding: "5px 11px", borderRadius: 20, background: colors.badge, border: `1px solid ${colors.border}`, fontSize: 12, color: colors.text, fontWeight: 600 }}>{w}</span>)}
            </div>
            <p style={{ margin: "10px 0 0", fontSize: 12, color: "#a8a29e" }}>→ Ajoute-les dans Anki. Lis chaque mot à voix haute 2×.</p>
          </>
        ) : (
          <p style={{ margin: 0, fontSize: 13, color: "#a8a29e", fontStyle: "italic" }}>{day.vocabNote}</p>
        )}
      </Card>

      {day.grammar && (
        <Card icon="🔧" title="Grammaire" time={day.grammar.time} colors={colors}>
          <p style={{ margin: "0 0 8px", fontSize: 13, color: "#292524", lineHeight: 1.6 }}><span style={{ color: colors.text, fontWeight: 700 }}>Focus : </span>{day.grammar.focus}</p>
          <div style={{ background: colors.badge, border: `1px solid ${colors.border}`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#57534e", fontStyle: "italic", lineHeight: 1.65 }}>{day.grammar.example}</div>
        </Card>
      )}

      <Card icon="👁️" title={`Compréhension — ${day.comprehension.type}`} time={day.comprehension.time} colors={colors}>
        <p style={{ margin: 0, fontSize: 13, color: "#44403c", lineHeight: 1.8 }}>{day.comprehension.task}</p>
      </Card>

      {day.listening && (
        <Card icon="🎧" title="Écoute active" time={day.listening.time} colors={colors}>
          <p style={{ margin: 0, fontSize: 13, color: "#44403c", lineHeight: 1.8 }}>{day.listening.task}</p>
        </Card>
      )}

      <Card icon="✍️" title={`Production active — ${day.active.type}`} time={day.active.time} colors={colors}>
        <p style={{ margin: 0, fontSize: 13, color: "#44403c", lineHeight: 1.8 }}>{day.active.task}</p>
      </Card>

      <Card icon="🔄" title="Mini-révision (spaced repetition)" time={day.revision.time} colors={colors}>
        <p style={{ margin: 0, fontSize: 13, color: "#44403c", lineHeight: 1.8 }}>{day.revision.task}</p>
      </Card>

      <div style={{ background: "#fffbf0", border: "2px solid #fcd34d", borderLeft: "4px solid #f59e0b", borderRadius: 12, padding: "12px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, color: "#b45309", fontWeight: 700, marginBottom: 5 }}>💡 Conseil du jour</div>
        <p style={{ margin: 0, fontSize: 13, color: "#78716c", lineHeight: 1.65, fontStyle: "italic" }}>{day.tips}</p>
      </div>

      <div style={{ background: "white", border: "1.5px solid #e8e0d4", borderRadius: 12, padding: "12px 16px", marginBottom: 16, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize: 10, color: "#c7bdb7", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 8, fontFamily: "monospace" }}>⏱ Répartition — 1h total</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          <Chip label="Vocab" time="10 min" c={colors} />
          {day.grammar && <Chip label="Grammaire" time={day.grammar.time} c={colors} />}
          <Chip label="Compréhension" time={day.comprehension.time} c={colors} />
          {day.listening && <Chip label="Écoute" time={day.listening.time} c={colors} />}
          <Chip label="Production" time={day.active.time} c={colors} />
          <Chip label="Révision" time={day.revision.time} c={colors} />
        </div>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
        {day.day > 1
          ? <button onClick={() => setSelectedDay(day.day - 1)} style={{ background: "white", border: "2px solid #e8e0d4", color: "#78716c", borderRadius: 10, padding: "9px 18px", fontSize: 13, cursor: "pointer", fontWeight: 700 }}>← Jour {day.day - 1}</button>
          : <div />}
        {day.day < 42
          ? <button onClick={() => setSelectedDay(day.day + 1)} style={{ background: colors.badge, border: `2px solid ${colors.text}`, color: colors.text, borderRadius: 10, padding: "9px 18px", fontSize: 13, cursor: "pointer", fontWeight: 700, boxShadow: `0 3px 10px ${colors.glow}` }}>Jour {day.day + 1} →</button>
          : <div style={{ fontSize: 15, color: colors.text, fontWeight: 800 }}>🎉 Programme terminé !</div>}
      </div>
    </div>
  );
}

function Card({ icon, title, time, colors, children }) {
  return (
    <div style={{ background: "white", border: "1.5px solid #e8e0d4", borderRadius: 12, padding: "14px 16px", marginBottom: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#57534e", display: "flex", alignItems: "center", gap: 6 }}><span>{icon}</span><span>{title}</span></div>
        {time && <span style={{ fontSize: 11, color: colors.text, background: colors.badge, border: `1px solid ${colors.border}`, padding: "2px 9px", borderRadius: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{time}</span>}
      </div>
      {children}
    </div>
  );
}

function Chip({ label, time, c }) {
  return (
    <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 20, background: c.badge, border: `1px solid ${c.border}`, color: c.text, fontWeight: 600 }}>
      {label} · {time}
    </span>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
